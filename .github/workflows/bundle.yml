name: Bundle
on:
  workflow_call:
    inputs:
      tag:
        description: "Git tag"
        required: true
        type: string
      release:
        description: "Cargo build profile"
        type: boolean
  workflow_dispatch:
    inputs:
      tag:
        description: "Binary name suffix"
        required: true
        type: string
      release:
        description: "Release build ? (otherwise DEV_ONLY)"
        required: true
        default: true
        type: boolean

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  BIN-FOLDER: bundle${{ !inputs.release && '-dev-only' || '' }}
  BUILD-PROFILE: ${{ !inputs.release && 'debug' || 'release' }}
  BUILD-FEATURES: ${{ !inputs.release && 'hot-reload' || '' }}
  ARTIFACT-NAME: Audioware-windows-${{ inputs.tag }}${{ !inputs.release && '-DEV_ONLY' || '' }}

jobs:
  bundle:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Prepare Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          key: release
      - name: Additional tools
        uses: taiki-e/install-action@v2
        with:
          tool: just
      - name: Bundle mod files
        run: just ci ${{ env.BIN-FOLDER }} ${{ env.BUILD-PROFILE }} ${{ env.BUILD-FEATURES }}
      - name: Upload files
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT-NAME }}.zip
          path: ${{ env.BIN-FOLDER }}/bin
          if-no-files-found: error
      - name: Upload .pdb
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT-NAME }}-PDB.zip
          path: ${{ env.BIN-FOLDER }}/pdb
          if-no-files-found: error
